<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BookMyShow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ID Selector -->
  <div id="header">
    <h1>BookMyShow</h1>
    <p>Now Showing</p>
  </div>
  <div id="movie-list">

  <!-- Class Selector -->
  <div class="movie-card">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQh5t0CF5pU4uYUKYv1M177UYNckaB_KT548A&s" alt="Kubera Poster">
    <h2>Kubera</h2>
    <p>Genre: Action | Duration: 3h 2m</p>
    <button type="button">Book Now</button>
  </div>

  <div class="movie-card">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQC3tdTbsPmPv2l_7ftNJGdwlQcnToRiQxlIQ&s" alt="Kannapa Poster">
    <h2>Kannapa</h2>
    <p>Genre: mythologic | Duration: 2h 5m</p>
    <button type="button">Book Now</button>
  </div>

  <div class="movie-card">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS2Dj8MK9r1glyVwVVU3TYzYkfc5G-7FyvGOA&s" alt="RRR Poster">
    <h2>RRR</h2>
    <p>Genre: Drama | Duration: 3h 5m</p>
    <button type="button">Book Now</button>
  </div>
</div>
</body>
</html>
